 #Imperial Reforms 
 
 codify_single_whip_law_decision_title: "Codify the Tax Laws"
 codify_single_whip_law_decision_desc: "By codifying the tax laws we will insert its legal precedent into our nation's judicial code."

 reign_in_estates_decision_title: "Rein the Factions"
 reign_in_estates_decision_desc: "The various factions within our realm run rampant, clutching their pearls upon being demanded to contribute and further applying pressure to receive favors and influence in exchange for corruption. We must put an end to this lest we risk the Empire falls in turmoil."

 reform_civil_registration_decision_title: "Civil Registration"
 reform_civil_registration_decision_desc: "A system aimed at keeping track of all our subjects within our realm, in a way to improve the standard of living of all those under our banner."

 establish_silver_standard_decision_title: "A Silver Standard"
 establish_silver_standard_decision_desc: "The introduction of the Single Whip law has definitely improved our taxing efficiency. However, we must take precautions and combat potential rampant inflation."

 kanhe_certificate_decision_title: "Standardize the Trade Routes"
 kanhe_certificate_decision_desc: "An imperial declaration aimed at empowering our merchants at home and abroad, while simultaneously allowing our subjects greater exclusive access in our markets."

 new_keju_formats_decision_title: "Formalize Bureaucracy"
 new_keju_formats_decision_desc: "This reform aims at refining the process behind the selection of candidates and potential bureaucrats during the Imperial Examination. Introducing new formats of tests and increased standards will certainly benefit our administration."

 inclusive_monarchy_decision_title: "Inclusive Monarchy"
 inclusive_monarchy_decision_desc: "Our domain is all-encompassing, and our subjects are many in numbers. As such, we must display the perfection and tolerance as exhibited by the heavens themselves and aim at creating a tolerant society that treats its people with dignity and compassion."

 promote_bureaucratic_faction_decision_title: "§OPromote Bureaucrats§!"
 promote_bureaucratic_faction_decision_desc: "The soul of our nation rests within our bureaucratic procedures. By empowering and favoring our bureaucratic minds over those of militant stance, we will settle struggles of power that may take place internally, in the future.\n§YMutually exclusive with the 'Promote Generals' reform§!\n"

 promote_military_faction_decision_title: "§OPromote Generals§!"
 promote_military_faction_decision_desc: "Those who lay their life down to secure our freedom, need be praised more than cushy bureaucrats who delegate endlessly on procedures and are trapped in endless red tape.\n§YMutually exclusive with the 'Promote Bureaucrats' reform§!\n"

 unifed_trade_market_decision_title: "Unify Asian Markets"
 unifed_trade_market_decision_desc: "By unifying access to all the markets we have influence in, our merchants will enjoy profits beyond their wildest dream, furthering our influence and increasing the size of our treasury."

 reform_the_military_branch_decision_title: "Reform the Army"
 reform_the_military_branch_decision_desc: "An Empire of our size needs able and brave men to protect it. However, having courage and valor are not enough in today's affairs. The need for a widespread standing army, reformed and powerful will play a vital role in maintaining our powerful position."

 modernize_the_banners_decision_title: "Popularize the Banners"
 modernize_the_banners_decision_desc: "The Banner army has served us dutifully, delivering blows to our enemies and securing crucial victories. If we are to maintain their top form and discipline, we must reform and improve them, or they will be at risk of decadence."

 study_foreign_ship_designs_decision_title: "Study Foreign Ships"
 study_foreign_ship_designs_decision_desc: "Foreign ships hold many secrets when it comes to master shipwrights and architectural design. It would be wise to issue a reform across our nation and instruct our ship builders to study them in great detail."

 tributary_embassies_decision_title: "Tributary Embassies"
 tributary_embassies_decision_desc: "Communication with all countries that pay tribute to our banner is vital as a deterrent of violence and better communication. To that end, it would be wise to enact a reform and fund official embassies across our sphere of influence."

 new_world_discovery_decision_title: "New World Expeditions"
 new_world_discovery_decision_desc: "The new world holds many exotic goods, commercial opportunities and expansion paths aimed at cementing our power. It would be wise to invest imperial influence in issues pronouncements, instructing officials to focus on studying these strange locations beyond the horizon."

 establish_gaituguiliu_decision_title: "Invite Non-Citizens to Court"
 establish_gaituguiliu_decision_emperor: "Invite Non-Citizens to Court"
 establish_gaituguiliu_decision_desc: "The native rulers in remote provinces, also known as foederati, are hereditary rulers of their local polities. These leaders might seem useful now and then due to their ties with the locals but have frequently proven to be a risk for regional stability in long-term. By slowly replacing them with regular officials appointed by the central government maintaining tranquillity on a regional level will become easier."

 seaban_decision_title: "Reform Seaban"
 seaban_decision_emperor: "Reform Seaban"
 seaban_decision_desc: "The seas and oceans bring trouble: piracy, smuggling, sometimes even the usurpers hide themselves behind the waves and tides, but maritime trade also brings fortune and discovery. In order to let the wealth and new innovations into our great realm, we should reform our Seaban regulations."

 reform_land_tax_decision_title: "Delegate Viceroys"
 reform_land_tax_decision_emperor: "Delegate Viceroys"
 reform_land_tax_decision_desc: "The vastness of our realm is utmost and unparalleled, however, regulating this is arduous. Hence let us create the position of viceroy to overseeing more than one province. They will be directing the provincial affairs as the Emperor's representative, so that the less crucial matters don't have to be reported to the capital."

 military_governors_decision_title: "Establish the Rex Limitum"
 military_governors_decision_emperor: "Establish the Rex Limitum"
 military_governors_decision_desc: "To manage the numerous subjects and lesser states from outlying regions within and beyond the imperial border, the Ministry of Rites is now deemed to be insufficient and inappropriate. We shall establish an office that focus on the dealing with them."

 centralizing_top_government_decision_title: "Reshape Bureaucracy"
 centralizing_top_government_decision_emperor: "Reshape Bureaucracy"
 centralizing_top_government_decision_desc: "To re-arrange the Guanzhi - bureaucratic ranks is not only to make a mere symbolic break with the incompetent dynasty who precedes us: by retuning the political structures of the Empire, our power will be concentrated and our regime will grow solid like a golden fortress with boiling moat."

 vassalize_tributaries_decision_title: "Elevate Foederati Status"
 vassalize_tributaries_decision_emperor: "Elevate Foederati Status"
 vassalize_tributaries_decision_desc: "The Roman Empire is overlord over several tributary states which acknowledge our superiority. While most barbarians will remain foreign to our ideals, other tributaries strive to come closer to the greatness of Heaven. It is the duty of the Emperor to elevate those who appease us the most."
 vassalize_tributaries_decision_tt: "The Emperor of Rome can use the Mantle to elevate a Tributary State to a direct Vassal."
 vassalize_tributaries_decision_ct: "The Emperor of Rome can no longer elevate Tributaries to Vassals."



 # HRE -> Celestial Empire
 HRE_HRE: "Celestial Empire"

 ## Reforms
 emperor_reichsreform_title: "Call for Imperial Reform"
 emperor_reichsreform_desc: "Reform the Empire to a more centralized model."
 emperor_reichsreform_province: "Imperial Reform"

 emperor_reichsregiment_title: "Legislative Reform"
 emperor_reichsregiment_desc: "Consolidate the Imperial Diet, and reduce the legislative complexity."
 emperor_reichsregiment_province: "Legislative Reform"

 emperor_gemeinerpfennig_title: "Enact Imperial Tithes"
 emperor_gemeinerpfennig_desc: "Require member states of the Celestial Empire to levy a special tax to be paid directly to the Emperor."

 emperor_hofgericht_title: "Restore the Emperor's Authority"
 emperor_hofgericht_desc: "Reduce legislative independence by making the Emperor the final legal authority within the Empire."

 emperor_landfriede_title: "Tianxia"
 emperor_landfriede_desc: "Force member states to solve their disputes in courts of law, rather than on battlefields."
 emperor_landfriede_province: "Tianxia"

 emperor_privilegia_de_non_appelando_title: "All Bow to the Huangdi"
 emperor_privilegia_de_non_appelando_desc: "Revoke The Privilege of Non-Appeal."

 emperor_erbkaisertum_title: "Restore the Hereditaty Mandate"
 emperor_erbkaisertum_desc: "Abolish the elective monarchy of The Holy Roman Empire."

 emperor_renovatio_title: "Awaken the Dragon"
 emperor_renovatio_desc: "Unite the disparate states of The Empire into a nation state."

 emperor_reichsstabilitaet_title: "Absolute Imperial Stability"
 emperor_reichsstabilitaet_desc: "Safeguard the stability of the Empire by securing the means for its expansion."

 emperor_perpetual_diet_title: "Perpetual Diet"
 emperor_perpetual_diet_desc: "Institute a permanent session of the Imperial Diet so that important matters can be brought before it as and when they happen."

 emperor_landsknechtswesen_title: "Reorganize the Prefectural Conscriptions"
 emperor_landsknechtswesen_desc: "Organize China's many mercenary bands into official regiments available for the Empire's defense."

 emperor_reichstag_collegia_title: "Establish Imperial Councils"
 emperor_reichstag_collegia_desc: "Divide the Empire into a series of councils for the Emperor, the Princes and the Imperial Cities to improve its functioning for all."

 emperor_geteilte_macht_title: "Reciprocal Bows"
 emperor_geteilte_macht_desc: "Guarantee the powers of the Princes so that they in turn may support the strength of the Emperor."

 emperor_rechenschaft_title: "Enshrine the Elective Mandate"
 emperor_rechenschaft_emperor_per_prince: "Elective Mandate"
 emperor_rechenschaft_desc: "Expand the Empire's checks and balances to create a more equitable system."

 emperor_expand_gemeiner_pfennig_title: "Expand Imperial Tithes"
 emperor_expand_gemeiner_pfennig_desc: "Increase the common tax to expand the Empire's capabilities in times of war."

 emperor_reichskrieg_title: "All Under Heaven"
 emperor_reichskrieg_desc: "Mobilize the Empire's forces against all who may seek to threaten it!"

 emperor_imperial_estates_title: "Elevate the Son of Heaven"
 emperor_imperial_estates_desc: "Curb the freedoms of the Imperial Estates so that they are no longer able to defy the Emperor."

 renovatio_effect: "Unite the §YCelestial Empire§! to one country!"
 vassalize_empire2: "All members of the §YCelestial Empire§! who support the reform will become our direct vassals, and those who do not support the reform will leave the empire, giving us claim on their lands."
 GETEILTE_MACHT_EFFECT: "Members of the Celestial Empire will no longer accumulate Aggressive Expansion against the Emperor when the Emperor takes non-empire Provinces"
