 daimyo_vassal_title: "Clann"
 daimyo_vassal_title_plural: "Clanns"
 daimyo_vassal_long_desc: "A Clann subject must follow their overlord to war, cannot make certain diplomatic actions and will pay a fraction of his income to his overlord. Clann subjects can also fight each other."
 daimyo_vassal_is_our: "$NAME|Y$ is our Clann Vassal."
