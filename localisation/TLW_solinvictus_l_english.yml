l_english:

### JEWISH ###
# Decisions #
 ask_jews_for_money_title: "Ask the Jews for Money"
 ask_jews_for_money_desc: "In the halls of our capital, where the Jewish community thrives with ancient wisdom and prosperous trade, we may seek their aid in times of need."
 JEWS_IN_CAPITAL: "Has a §YJewish Community§!."
 JEWS_LOAN_BORROW_RECENTLY: "Not asking for a loan in the last §Y5§! years."
 repay_jewish_loan_title: "Repay the Jewish Loan"
 repay_jewish_loan_desc: "The time has come to honor the bonds forged with the Jewish community of our capital. Their loans, extended in good faith, have bolstered our empire's fortunes, but debts must be settled to maintain the balance of honor."
 JEWS_LOAN_PAY: "Lose §R-[Root.jewish_community_loan.GetValue]§! Ducats."
 expel_the_jews_title: "Expel the Jews"
 expel_the_jews_desc: "The Jewish community in our capital has become entangled in our realm's fortunes through their loans. To unburden our treasury, we may decree their expulsion, erasing all debts in the process."
 JEWS_EXPEL: "Every owned §YJewish Community§! will be banished."

# Events #
 tlw_jewish.0.t: "The Jews of [Root.GetName]"
 tlw_jewish.0.d1: "The banners of our domination now fly over [Root.GetName], where a thriving Jewish community, steeped in Hebrew wisdom and trade, has long flourished. In the shadow of [Root.GetName]'s walls, their scholars pen treatises in the tradition of distant sages, while merchants weave networks of silk and spice that enrich the province's markets. As conquerors of this storied land, we stand at a choice: shall we embrace the Jews of [Root.GetName], granting them autonomy to continue their works and bolster our coffers, or banish them to quell the murmurs of those wary of their influence?"
 tlw_jewish.0.d2: "As our banners rise over [Root.GetName], we find a vibrant Jewish community, their synagogues and markets a testament to a legacy of resilience and wisdom. In the streets of [Root.GetName], our kin have thrived, their scribes preserving sacred texts and their traders binding distant lands in commerce. As rulers of the same faith, we can let this community flourish in its historic home, strengthening [Root.GetName]'s prosperity. Or, should we summon them to our capital, uniting our people's wisdom in a grand hub of learning and trade?"
 tlw_jewish.0.a: "They are welcome to stay in our realm"
 tlw_jewish.0.b: "Pack up your things and leave!"
 tlw_jewish.0.c: "They should stay where they belong"
 tlw_jewish.0.e: "We will relocate them to the capital"
 JEWS_FLEE_ANOTHER_COUNTRY: "The Jews will seek refuge in another country..."

 tlw_jewish.1.t: "The Jewish Refugees"
 tlw_jewish.1.d1: "From the lands of our neighbor countries, a wave of Jewish refugees arrives at our borders, driven forth by banishment and seeking haven in our realm. These wanderers, heirs to a lineage of scholars, merchants, and artisans, carry with them tales of resilience forged in the crucibles of distant empires. Their skills in trade and learning could enrich our markets and courts, much as they once bolstered the realms of old. Yet, their arrival stirs the winds of change, for our people whisper of unfamiliar customs and the burdens of strangers in our midst. Shall we open our gates to these exiles, welcoming their wisdom to weave new threads into our empire's tapestry, or turn them away, preserving the harmony of our lands as the annals of history demand?"
 tlw_jewish.1.d2: "Brethren from another realm seek refuge at our borders, expelled from their homes yet unbowed in spirit, their journey a chapter in the enduring saga of our people. These kin, bearers of sacred texts and timeless crafts, arrive with the fire of survival kindled in their hearts, ready to share their knowledge in the halls of our shared heritage. As rulers of a faith bound by ancient covenants, shall we embrace our exiled brothers and sisters, strengthening the bonds of our community and weaving their strengths into our realm's grand narrative, or send them onward, mindful of the strains such influx might place upon our lands?"
 tlw_jewish.1.a: "Welcome the refugees"
 tlw_jewish.1.b: "They may stay in our realm"
 tlw_jewish.1.c: "Turn them away"

 tlw_jewish.2.t: "Growth of the Jews in [Root.GetName]"
 tlw_jewish.2.d: "In [Root.GetName], the Jewish community has flourished under our stewardship, its tremendous growth was driven by the wealth and wisdom poured into these lands. The markets of [Root.GetName] now brim with silks and spices, led by the tireless commerce of Jewish merchants whose networks span seas and empires. In synagogues and scriptoria, scholars pen works of philosophy and science, their scrolls gleaming with the knowledge of ages past. This ascendant community, now a radiant jewel in our realm, draws artisans and traders from distant shores."
 tlw_jewish.2.a: "As long as they contribute to our prosperity"

 tlw_jewish.3.t: "The Jewish Loan"
 tlw_jewish.3.d: "In the shadow of our capital, representatives of the Jewish community approach our court, their scrolls bearing tidings of solidarity forged in the crucibles of history. These merchants and scholars, guardians of timeless knowledge, offer loans free of interest, a gesture rooted in their enduring legacy of resilience and commerce. Shall we accept their generosity to bolster our treasury, or tread cautiously, mindful of the storms that unpaid obligations may summon?"
 tlw_jewish.3.a: "Accept a great loan"
 tlw_jewish.3.b: "Accept a medium loan"
 tlw_jewish.3.c: "Accept a small loan"
 tlw_jewish.3.e: "On second thought, we should decline the offer"
 JEWS_LOAN_DUCAT_1YEAR: "Gain §G[Root.jewish_community_loan.GetValue]§! Ducats.\nThis loan must be repaid within §Y5§! years."
 JEWS_LOAN_DUCAT_3YEAR: "Gain §G[Root.jewish_community_loan_3year.GetValue]§! Ducats.\nThis loan must be repaid within §Y5§! years."
 JEWS_LOAN_DUCAT_5YEAR: "Gain §G[Root.jewish_community_loan_5year.GetValue]§! Ducats.\nThis loan must be repaid within §Y5§! years."

 tlw_jewish.4.t: "The Unpaid Debt"
 tlw_jewish.4.d: "Five years have passed since we sought the aid of the Jewish community in our capital, their loans a lifeline in times of trial. Unfortunately, the coffers remain strained, and repayment eludes us. In a grand audience beneath the arches of [Root.Capital.GetName], the community's elders approach with solemn grace, offering to erase the debt in exchange for greater autonomy. Their proposal would consecrate the province as a haven of their faith, transforming it into a Jewish diaspora. This act of mercy carries the weight of history, binding our realms in a new covenant forged from necessity and honor."
 tlw_jewish.4.a: "Be done with it..."
 JEWS_BETTER_MOVE_CAPITAL_TIP: "We better move the capital elsewhere. Or, there is also another option..."

 tlw_jewish.6.t: "A Chance to Convert?"
 tlw_jewish.6.d: "From the turmoil of their old homeland, Jewish refugees have sought sanctuary in our realm. These exiles, tempered by the trials of history, stand at our gates. In the shadow of our sacred altars, their religion piques our curiosity. Should we adopt their sacred covenant, converting our realm to Judaism and learning from the teachings of Moses forging, or reaffirm our ancestral gods, granting them refuge while preserving our traditions?"
 tlw_jewish.6.a: "We shall embrace Judaism"
 tlw_jewish.6.b: "We cannot abandon our roots"

 tlw_jewish.7.t: "Sephardic Legacy of the Visigoths"
 tlw_jewish.7.d: "In the verdant valleys and sun-baked hills of Hispania, the Sephardic Jews have carved a place of enduring splendor since the Visigothic conquests swept through Iberia in the 5th century. [219.GetName] emerged as the crown jewel, where Abd al-Rahman III's court welcomed Hasdai ibn Shaprut, a physician and diplomat whose counsel bridged faiths and kingdoms, fostering an era where Arabic, Hebrew, and Latin intertwined in pursuit of knowledge. [225.GetName]'s narrow lanes became a forge for philosophers like Maimonides, whose 'Guide for the Perplexed' sought harmony between reason and revelation amid the city's synagogues and scriptoria. [224.GetName]'s bustling ports drew merchants whose caravans carried spices from the East and silks from the Levant, weaving al-Andalus into the web of global trade. [223.GetName], perched on its rocky heights, sheltered artisans and poets whose verses echoed the Alhambra's intricate designs, blending Moorish grandeur with Jewish resilience. These communities, scattered across Juderías alive with the hum of daily life, excelled in medicine, astronomy, and finance, their contributions illuminating the Golden Age under tolerant rulers. As shadows of conflict loom from Roman frontiers, the fate of these Sephardic guardians of wisdom hangs in the balance, their story a chapter in the epic of Hispania - a land where diverse souls forged an utopia of the mind."
 tlw_jewish.7.a: "We shall honor the Sephardic heritage of our lands"
 JEWS_COMMUNITY_SEPHARDIC: "§Y[224.GetName]§!, §Y[2754.GetName]§!, §Y[227.GetName]§!, and §Y[225.GetName]§! will receive:"

 tlw_jewish.8.t: "The Haven of [4526.GetName]"
 tlw_jewish.8.d: "Within the heart of Greater Poland, where the cathedral spires of [4526.GetName] rise amidst the still-recovering Poles, a thriving Jewish community has taken root, drawn by the promise of sanctuary under the Piast banner. Descendants of merchants and scholars who fled the turmoil of distant lands, these Jews arrived along ancient amber roads, their carts laden with coin and codices. In the shadow of Mieszko's Christian conversion in 944, which sundered Poland into warring factions, the Poles welcomed these exiles, seeking their acumen to fortify a realm beset by Vistulan spears and Mazovian ambition. In the markets, Jewish traders barter furs from the Baltic and spices from the Rus', their stalls a lifeline for an Orthodox kingdom encircled by foes. Within modest synagogues, rabbis preserve ancient laws, their teachings a quiet counterpoint to the cathedral's chants, offering counsel to a court navigating the treacherous divide between Christian allies and pagan adversaries. As the most successful realm in a fractured Poland, the Piasts see in this community a spark of hope - a chance to wield their financial prowess and diplomatic ties to reclaim the crown of a united realm." 
 tlw_jewish.8.a: "With their helps, the dream of Poland will be realized"

 tlw_jewish.9.t: "The Jews of Gallia"
 tlw_jewish.9.d: "Across the sprawling realm of Syagrian Gallia, from the coasts of Septimania to the banks of the Liger, Jewish communities have carved havens of commerce and learning. In [2753.GetName], merchants sail from Mediterranean ports, their holds brimming with silks and spices from Iberia, binding Roman and Visigothic worlds under Syagrius's eagle banner. Along [203.GetName]'s Rhodanus, traders navigate river currents, their coin fueling Burgundian ambitions against Theodiscian domination. [201.GetName], heirs to Roman harbors, hum with Jewish shipwrights and brokers, their wares tying Gallia to Byzantine agoras. In [184.GetName], Liger Valley markets pulse with the trade of furs and wine, Jewish ledgers steadying a kingdom's heart. [196.GetName], nestled near Pyrenean passes, harbors exiles whose acumen bridges Aquitainia to Visigothic [225.GetName]. Forged in the diaspora's long march, these communities thrive under royal charters, their synagogues echoing with Hebrew prayers amid cathedral bells. With bishops like Agobard of [203.GetName] sharpen their quills against this ancient faith, the Jews of Gallia walk a knife's edge, their wealth and wisdom a cornerstone of a realm striving to forge a new empire from the shadow of Rome. In this age of iron and faith, their legacy will shape the Syagrian dream - or falter under the weight of suspicion."
 tlw_jewish.9.a: "It is great to have them"

 tlw_jewish.10.t: "Home of the Ashkenazim"
 tlw_jewish.10.d: "Along the Rhine's relentless flow, where the river carves through the heart of the Holy Roman Empire's cradle, Jewish communities have anchored themselves in the sturdy stones of Mainz, Frankfurt, and the Palatinate. In Mainz, the ancient seat of Theodiscian archbishops, these early Ashkenazi settlers arrived with the dust of diaspora trails, their markets alive with the barter of Rhine wine and eastern dyes, sustaining an empire's veins amid the chaos of Saxon uprisings and Mongol raids. Frankfurt's ford-crossed paths became a crossroads for their caravans, where merchants forged pacts that steadied Ottonian crowns, their coin a silent force in the forging of imperial charters. The Palatinate's vine-clad hills sheltered scholars whose debates in modest halls laid the groundwork for Talmudic traditions, their insights a quiet counter to the thunder of knightly oaths. Protected by emperors who saw in them bridges to distant trade and forgotten lore, these Jews navigated the river's bends with resilience, their synagogues rising beside cathedral towers in a land where Christian unity clashed with pagan echoes."
 tlw_jewish.10.a: "We shall honor their legacy"

 tlw_jewish.11.t: "The Romaniote Heritage"
 tlw_jewish.11.d: "In the gilded heart of the Byzantine Empire, from [151.GetName]'s towering walls to the windswept shores of Lesbos and Chios, the Romaniote Jews have etched their mark as guardians of an ancient heritage. Rooted in the Hellenistic age, these steadfast communities have endured since Roman legions first trod Greek soil, their identity forged in the crucible of East and West. In [151.GetName], the Queen of Cities, their merchants thread the Bosporus with silks and spices, their stalls in the Great Bazaar a lifeline for an empire straddling two continents. On Lesbos and Chios, island artisans dye fabrics with hues of the Aegean, their looms weaving wealth that bolsters Byzantine fleets against Mongol sails. The bustling agora of [4701.GetName] thrums with Jewish traders, their coin and contracts fueling the Peloponnese's revival, while Epirus' olive-clad hills shelter scholars whose Greek-Hebrew texts bridge classical wisdom and sacred law. Protected by imperial edicts, yet eyed warily by Orthodox patriarchs, the Romaniotes navigate a delicate balance, their synagogues standing resolute amid basilicas' golden domes. As Byzantium grapples with foes from steppe and sea, these Jews - heirs to a millennium of brilliance - offer trade and intellect to sustain the Roman dream, their fate a pivotal chapter in an empire poised between glory and peril."
 tlw_jewish.11.a: "Honor their heritage!"
 JEWS_COMMUNITY_ROMANIOTES: "§Y[2348.GetName]§!, §Y[4700.GetName]§!, §Y[4701.GetName]§!, and §Y[4699.GetName]§! will receive:"

 tlw_jewish.12.t: "Tales of the Italkim"
 tlw_jewish.12.d: "Across the sun-kissed lands of Italy, from the sapphire waves of Sicily to the marble heart of Rome, the Italkim weave a storied legacy as old as the Tiber's flow. In [125.GetName] and [121.GetName], under the banner of the Kingdom of Zangitania, Jewish merchants ply harbors brimming with eastern silks and African gold, their trade a bridge between Muslim emirs and Christian lords, sustaining an island realm caught in the Mediterranean's embrace. In Roma, where the Pope resides, the Italkim of Trastevere trace their roots to Caesar's day, their stalls and study houses thriving under papal gaze, yet tempered by the Church's stern decrees. [116.GetName]'s budding markets hum with their commerce, where artisans and lenders fuel a city stirring with ambition amid Tuscan hills. In Venezia, where lagoons cradle ships bound for Byzantium, Jewish traders navigate the tides, their coin and contracts forging the wealth of a maritime republic. Heirs to the ancient diasporas back in Roman rule, these Italkim - merchants, scribes, and craftsmen - carry the weight of centuries, their synagogues a testament to endurance amid cathedral spires and minarets."
 tlw_jewish.12.a: "Their contributions are remarkable"

 tlw_jewish.13.t: "The Toshavim Tapestry"
 tlw_jewish.13.d: "From the sands of [2954.GetName] to the labyrinthine houses of [343.GetName] and the ancient ramparts of [336.GetName], the Toshavim Jews have woven a resilient thread through Africa's storied fabric since the Phoenician sails first grazed Carthage's shores. In [341.GetName], heirs to Punic traders, they navigate ports where Roman galleys once unloaded Judean captives, their markets echoing with the haggling of olive oil and desert dates, a commerce that sustained Fatimid caliphs and Berber dynasties alike. [2954.GetName]'s island sanctuaries, forged in the wake of Solomon's Temple's fall, shelter communities whose Ghriba synagogue - built from stones whispered to hail from Jerusalem - stands as a pilgrimage beacon, its walls etched with prayers that outlasted Vandal hordes and Byzantine conquerors. [336.GetName], crown of eastern Gaetulia, harbors Toshavim scribes whose ink flows in the shadow of Diimauri shrines, their treatises on medicine and astronomy blending Talmudic insight with Berber lore, turning a city of scholars into a crossroads of faiths. [336.GetName]'s fortified citadel, gateway to Sadi power, hosts Jewish artisans whose dyes color the robes of kings, their caravans threading the Atlas Mountains with salt from the Tenes and spices from the Levant, a lifeline for a realm besieged by Christian crusades and nomadic raids. These native sons of the land have endured as Africa's quiet architects, their synagogues rising beside minarets in a mosaic of coexistence. As the warring factions of Africa stir the dunes, the Toshavim's ancient covenant teeters on the edge of survival, their legacy a defiant flame in the North African night."
 tlw_jewish.13.a: "Preserve their flame. We must not extinguish it"

 tlw_jewish.14.t: "The Mizrahim of the East"
 tlw_jewish.14.d: "From the Nile's fertile embrace to the Tigris' golden banks, the Mizrahi Jews have forged vibrant enclaves across the Islamic heartlands, their legacy a cornerstone of empires. In [358.GetName], where ancient pharaohs once guided ships, Jewish merchants now steer galleys heavy with Indian gems and Egyptian grain, their academies weaving Hellenistic logic with Torah's law. [361.GetName]'s bustling Roman Babylon, the Parsig crown, thrums with traders and scribes, their markets and genizot binding Africa to Asia in a web of commerce and learning. [410.GetName], the Lakhmid beacon, shelters tens of thousands, its Jewish quarter a hive of silk merchants and Talmudic sages, whose Geonim shape faith from the Tigris' edge. [377.GetName]'s caravan routes pulse with Jewish brokers, their wares linking Persian looms to Levantine ports, while [382.GetName], cradled by ancient walls, harbors artisans whose mosaics grace both mosque and synagogue. Under the caliphs' dhimmi covenant, these communities - rooted in the diaspora's ancient tides - drive an Islamic golden age, their physicians curing emirs, their financiers banking dynasties."
 tlw_jewish.14.a: "They are a great asset to our prosperity"
 JEWS_COMMUNITY_MIZRAHIM: "§Y[361.GetName]§!, §Y[382.GetName]§! and §Y[377.GetName]§! will receive:"

 tlw_jewish.15.t: "The Parsim Beacons"
 tlw_jewish.15.d: "Across the highlands of Persia, where Manichaean flames cast light on a realm bowed by Mongol conquest, the Parsim Jews have forged vibrant enclaves from Spahan's teeming markets to Tabriz's northern gates. In Spahan, the Yahudiyya quarter pulses with merchants who trade silk with Cathay and turquoise with Samarkand, their coin fortifying a kingdom defiant of caliphal reach. Istakhr, heir to Achaemenid glory, harbors artisans whose woven tapestries adorn Zoroastrian halls, their craft a testament to Fars' enduring wealth. Hamedan, steeped in the legend of Esther, shelters scholars whose scrolls blend Hebrew law with Persian poetry, their debates a quiet hum beneath temple fires. Susa, ancient seat of kings, hosts traders whose caravans thread desert routes, linking Persia to Mesopotamian markets. Yazd's sun-baked streets brim with Jewish weavers, their textiles fueling a trade hub cradled by Zoroastrian shrines. In Tabriz, where northern winds carry tales of steppe riders, Jewish brokers barter furs and amber, their ledgers a bulwark for an empire's frontier. Under the magi's grudging tolerance, these Parsim communities - born of Babylon's exile - weave commerce and wisdom into Persia's fabric, their synagogues standing resolute beside fire altars."
 tlw_jewish.15.a: "Their history binds with ours"

 tlw_jewish.16.t: "The Traders of Malabar Shores"
 tlw_jewish.16.d: "Along the spice-scented coasts and verdant hinterlands of southern India, where monsoon winds guide ships to ancient ports, the Jewish communities of the Malabar and beyond have carved a vibrant legacy. In [535.GetName], where the Arabian Sea meets Chera shores, merchants of the diaspora, heirs to Judean exiles, barter pepper and cardamom, their synagogues rising in Jew Town's embrace under royal grants. [534.GetName], fabled Shingly, hums with traders whose ships link Yemen's frankincense to China's silks, their ancient haven a beacon since the Temple's fall. [537.GetName]'s bustling quays, kissed by Kerala's tides, host Jewish brokers whose copper-plate privileges bind them to Chera kings, their wares fueling maritime wealth. In [536.GetName], amid Pandya temples, Jewish merchants weave through Tamil markets, their coin strengthening inland routes to the Coromandel. [2030.GetName]'s Konkan shores shelter traders whose dhows sail to Persian Gulf emporia, their presence a thread in India's coastal tapestry. Under the tolerant gaze of Hindu rajas, these communities blend Hebrew law with Malayalam songs, their stalls and study houses a quiet force in a land of a thousand gods."
 tlw_jewish.16.a: "We are honored to protect their maritime legacy"

 tlw_jewish.17.t: "The Jews of the Steppes"
 tlw_jewish.17.d: "In the vast sweep of the steppes, where Kievan Rus and Borjigin khans hold sway, Jewish communities have forged vital outposts of trade and endurance. In [280.GetName], along the Dnieper's gleaming currents, merchants of the Podil quarter barter furs and Baltic amber, their wares linking Slavic lands to Byzantine harbors, a lifeline for a realm of warring princes. [289.GetName]'s riverbanks echo with Jewish traders, their stalls binding Rus to distant markets amid pagan chants. Across the windswept plains, [442.GetName] stands as a Silk Road beacon, its Bukharan Jews weaving Persian silks and Indian spices into the Golden Horde's coffers, their synagogues a haven under khanly tolerance. [454.GetName], jewel of the Borjigins, thrums with Jewish brokers whose caravans brave steppe raiders, their ledgers fueling an empire from Cathay to the Caspian. Rooted in the diaspora's ancient wanderings, these enclaves thrive under the uneasy grace of Rus chieftains and Mongol lords, their commerce and resilience a quiet force amid yurt-dotted horizons."
 tlw_jewish.17.a: "Such skillful merchants they are!"

 tlw_jewish.18.t: "The Jewish Silk Weavers"
 tlw_jewish.18.d: "In a China torn between the Great Yuan's northern dominion and the warring lords of the south, Jewish communities weave a resilient thread through the empire's fractured heart. In Kaifeng, where the Yellow River's flow meets Yuan hooves, Persian merchants trade jade and saffron, their synagogue a quiet haven amid Mongol banners. Xi'an, ancient Chang'an, pulses with Jewish scribes in its Western Market, their scrolls blending Hebrew lore with Han wisdom under Yuan rule. Luoyang's faded imperial halls shelter traders, their wares tying steppe to sea. Khanbaliq, a northern outpost, hosts Jewish brokers in Youzhou's shadowed markets, their ledgers a spark in the Great Yuan's frontier. Ningxia's desert paths harbor wayfarers, their caravans linking Borjigin khans to distant Cathay. In the south, Hangzhou's silk-laden junks sail under warlord flags, Jewish merchants bartering with Malabar's shores. Ningbo's ports hum with traders, their spices fueling coastal wealth, while Quanzhou's docks bind China to Yemen's frankincense. Yangzhou's canals brim with Jewish commerce, their coin strengthening warlord coffers. Yingtian, beneath Jinling's ancient walls, cradles merchants weaving trade with Chola ports. Guangzhou's South Sea markets thrive with Jewish brokers, their gems a lifeline for fractious lords. Rooted in the diaspora's ancient wanderings, these enclaves flourish under Yuan tolerance and warlord pragmatism, their synagogues standing resolute amid pagodas and yurts."
 tlw_jewish.18.a: "We can make use of their skill"

 tlw_jewish.19.t: "Jewish Communities of Buniq"
 tlw_jewish.19.d: "Across the verdant expanses of Buniq, from the mist-shrouded shores of the Zeugitana Bay to the boundless plains of the Great Hordes where buffalo roam, Jewish communities have taken root, their legacy woven into the vibrant tapestry of a new world. Born of the diaspora that followed Punic sails across the Atlantic, these merchants and scribes arrived with Carthage's exiles, their wares and wisdom blending with the knowledge of advanced tribes, kingdoms, and republics. In bustling coastal markets, they barter tobacco and cotton, their ships linking the Punic League's harbors to the shores of Hylinia or the marshes of the Muskogean Syndicate. Along inland rivers, Jewish traders exchange furs and maize, their caravans threading through Punic cities and native strongholds alike, forging ties that bind a fractured land. Scholars pen chronicles that marry Talmudic rigor with tales of indigenous spirits, while artisans craft tools that arm the warriors of Buniq."
 tlw_jewish.19.a: "They are a great help to this continent"

