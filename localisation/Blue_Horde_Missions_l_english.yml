l_english:
 BLU_enable_the_varangians: "Enable '§JVarangian§!' mercenaries, whose hiring will cost no §YArmy Professionalism§!."
 BLU_integrate_slavs_title: "Integrate the Slavs"
 BLU_integrate_slavs_desc: "We should work to integrate the Slavic tribes in the Haemus. These hardy, mountainous people will make good soldiers."
 BLU_rein_in_title: "Reaffirm the Yoke"
 BLU_rein_in_desc: "In recent decades our tributaries have shown worrying signs of independence. They believe we are incapable of defending them and have been shirking their dues. For now, let us use diplomacy to reaffirm their oaths of loyalty."
 BLU_build_army_title: "Restore our Army"
 BLU_build_army_desc: "If we wish to restart our conquests, then we must first rebuild our depleted armies."
 BLU_end_pretenders_title: "End the Roman Pretenders"
 BLU_end_pretenders_desc: "When Ogedei Khan took the City of the Caesars, not all remnants of the Roman regime were ended. A large mass of exiles escaped to Anatolia and founded a state in exile there. They've proved a thorn in our side for too long. Time to put them to the sword!"
 BLU_anatolia_title: "Anatolian Autocrats"
 BLU_anatolia_desc: "With the Roman pretenders gone, there is no one to stop us now from ending the petty Anatolian kingdoms and establishing our rule."
 BLU_rhom_title: "The Rhomaioi"
 BLU_rhom_desc: "Now with the last Roman remnants gone, let us integrate these proud, industrious people into our state and claim their legacy."
 BLU_varangoi_title: "Claim the Varangians"
 BLU_varangoi_desc: "When the Roman empire fell, remnants of their powerful Varangian Guard and escaped the city and fought their way into control of strategic cities in Greece. Let us show these warriors that they are better off serving us than remaining independent."
 BLU_tame_greece_title: "Tame Greece"
 BLU_tame_greece_desc: "For too long Greece has stayed out of our grasp. It has remained divided between a bunch of native and western states and trading republics. The time is right for us to sweep in and plant our flag in the Morea."
 BLU_naval_title: "Mongol Aegean"
 BLU_naval_desc: "We Mongols were never a seafaring people. Perhaps this is why we have not been able to conquer the islands of the Aegean since the time of Ogedei. These islands are a threat to our trade and a source of piracy. What better way to prove our newfound strength than to finally take them?"
 BLU_balkans_title: "Haemic Hegemons"
 BLU_balkans_desc: "The last independent states in the Haemus are the Latin trading cities and the Dalmatians. With their conquest, we can establish absolute authority over this peninsula."
 BLU_basiliousa_title: "Queen of Cities"
 BLU_basiliousa_desc: "Of old the City was called the Basiliousa, Queen of Cities. But this city we control does not exactly match up to those descriptions. It's time to change that and restore the New Rome to it's old glory."
 BLU_establish_church_title: "Establish Clerical Authority"
 BLU_establish_church_desc: "Our conversion to Christianity is fairly recent and many still doubt our conviction. We must assuage the fears of the Holy Church and embrace orthodox ways."
 BLU_singular_faith_title: "One True Faith"
 BLU_singular_faith_desc: "Before we had embraced God's light, many of our people had been followers of the sinner Mani. Now that we have seen the light, we can only look askance at those among us who continue to follow the Gnostic ways. Let us stamp down on their pagan ways and enforce the one true faith on all."
 BLU_choose_path_title: "Now What?"
 BLU_choose_path_desc: "With the end of our woes, we are free to choose our new path. Will we hold on to the old ways, or will we give birth to a new civilization?"
