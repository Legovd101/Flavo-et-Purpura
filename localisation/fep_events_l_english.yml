l_english:
 flavor_blu.0.t: "The Yoke Enters a New Millenium"
 flavor_blu.0.d: "Exactly sixty years have passed since Ogedei first made his base in [261.GetName] in preparation for an invasion of Europe. Little did he know, he would achieve what the rivals of Rome could not: a successful siege and conquest of the City of the World's Desire. Ever since then, we have done our best to honor his legacy by making Europe our new home.\n\n The elderly Khan Kaidu sits on Constantinople's throne, acting as the lynchpin of a tentative Mongol-Rhoman union (being the firstborn son of the previous Khan and educated by the Despoina of Adrianopolis). Unfortunately, all is not exactly well in the realm. While Kaidu's name is feared from Laodicea to Lutetia, the tributaries in the Far West have become uppity as they slowly recover (despite our best efforts...). In the event of the [Root.Monarch.GetTitle]'s unfortunate death, we may be faced with the wrath of Europe once more..."
 flavor_blu.0.a: "Best make use of this prosperity while it lasts."
 flavor_blu.0.a.tt: "As long as [Root.Monarch.GetName] [Root.Monarch.GetTitle] lives, as the ruler of the @BLU Blue Horde he will greatly reduce the liberty desire of the all vassal countries."
 flavor_blu.1.t: "The Death of Kaidu Khan"
 flavor_blu.1.d: "Kaidu is dead. As the last Khan to have truly seen the terror the Mongols brought to Europe firsthand, he leaves big shoes for [Root.Monarch.GetName] to fill. Without the wise hand of [Root.Monarch.GetHerHis] father at [Root.Monarch.GetHerHis] side, [Root.Monarch.GetName] [Root.Monarch.GetTitle] will be left on [Root.Monarch.GetHerHis] own against the now-emboldened mobs of angry Europeans looking to give the Blue Horde a taste of their own medicine."
 flavor_blu.1.a: "May the Pax Mongolica ever thrive!"
 flavor_blu.1.a.tt: "Get ready for war, because the farthest tributaries may start to rebel, and they may have help!"
 flavor_blu.2.t: "Death of Kaidu Khan"
 flavor_blu.2.d: "Kaidu is dead. Finally, the great leader of the dastardly Blue Horde is gone, leaving us the chance of a lifetime."
 flavor_blu.2.a: "This is our chance to finally shake the yoke off our necks!"
 flavor_blu.2.b: "Interesting Development..."
 flavor_blu.3.t: "[From.GetName] Declares Their Independence!"
 flavor_blu.3.d: "In the wake of Kaidu's death, the treacherous [From.Monarch.GetTitle] of [From.GetName] has declared [From.Monarch.GetHerHis] realm's autonomy from the Khan of the West!"
 flavor_blu.3.a: "So it's treason, then."
 flavor_blu.3.b: "Damnation! But we have bigger problems.."
 flavor_blu.4.t: "A Chance at Freedom"
 flavor_blu.4.d: "Without the power of Kaidu behind the Mongol throne, we have a real opportunity to gain our autonomy. "
 flavor_blu.4.a: "This is our chance to finally shake the yoke off our necks!"
 flavor_blu.4.b: "I don't feel confident in our ability to take on the Mongols..."
 flavor_blu.5.t: "The Dissolution of the Blue Horde"
 flavor_blu.5.d: "In spite of our best efforts, the Blue Horde is neither as strong nor as unified as it has been. Various relatives and generals of the Khan have arisen, seeking to carve out realms of their own in a vain attempt at mimicking Ogedei's great legacy. Whether the Mongols will remain a power in eastern Europe has yet to be seen, but this moment will surely prove a turning point in history."
 flavor_blu.5.a: "We stray further from righteousness every day..."
 flavor_blu.5.a.tt: "Ogedei's Empire will split into @RML Romylia, @MQD Maqedonia, @ILY Lirya, @PMN Pammongrii, and @DKA Dakya."
 flavor_blu.6.t: "The Future of the Blue Horde"
 flavor_blu.6.d: "It has been a long, tiresome journey. But at last, the Horde has beaten off all challengers and maintained the yoke. As [Root.Monarch.GetName] [Root.Monarch.GetTitle] sits on his throne, his courtiers come to him regarding the new direction of the realm. Will he fully embrace the dream of Rome? Or shall he stay true to the legacy of Genghis Khan above all?"
 flavor_blu.6.a: "Restore the oikoumene! We are Rome reborn!"
 flavor_blu.6.b: "From Qaraqorum to [151.GetName], the Ulus shall stretch once more!"
 ogedei_legacy: "Ogedei's Legacy"
 kaidu_death: "Kaidu's Death"

# Reformation
 corkish_flavor.0.t: "'On the Power of the Church in Lutetia'"
 corkish_flavor.0.d: "A number of peasants have declared that the priests in Gallia "seek only to serve their pouches and not their fellow man," and have declared themselves free from church bureacracy as a whole, claiming to operate under the "Corkish Orthodoxy," a spiritual successor to the Celtic Orthodox churches of old."
 corkish_flavor.0.a: "Smite these fools like the heretics they are!"
 dolettan_flavor.0.t: "The recession of Church Bureaucracy in the South"
 dolettan_flavor.0.d: "In a bid to restore their legitimacy, the Kings of the North have declared the clergy subservient to them, and have founded their own papacy in Oslo!"
 dolettan_flavor.0.a: "Smite these fools like the heretics they are!"
 nidarite_flavor.0.t: "The recession of Church Bureaucracy in the North"
 nidarite_flavor.0.d: "REPLACE_ME"
 nidarite_flavor.0.a: "Let this be the start of a brighter future for the North!"
 rhenish_flavor.0.t: "'A Christian Perspective'"
 rhenish_flavor.0.d: "The priest known as Hildirik has published a book of fallacious claims about the Arian church, claiming their teachings contradict the bible!"
 rhenish_flavor.0.a: "Smite these fools like the heretics they are!"

# Varangians
 varangian_flavor.0.t: "[returning_corps.GetName] Leave for Home!"
 varangian_flavor.0.d: "Due to a number of circumstances, the home of the [returning_corps.GetName] no longer agrees to leave their men in our service."
 varangian_flavor.0.a: "Blast!"

# Scandinavia
 fep_scandinavian_flavor.0.t: "Approaching the Norwegian Throne"
 fep_scandinavian_flavor.0.d: "A diplomat has been sent with the message of unification of our kingdoms to Norway."
 fep_scandinavian_flavor.0.a: "Let's pray they get the message."
 fep_scandinavian_flavor.1.t: "An Envoy from the [From.GetAdjective] Court Approaches..."
 fep_scandinavian_flavor.1.d: "The normal humdrum of court life was interrupted today when a diplomat from [From.GetName] sought an audience with the [Root.Monarch.GetTitle], offering a deal of union and peace between our people."
 fep_scandinavian_flavor.1.a: "Let the historic bonds between our people grow ever stronger!"
 fep_scandinavian_flavor.1.b: "Are they mad? Do they think *us* mad??"
 fep_scandinavian_flavor.2.t: "[From.GetName] Accepts!"
 fep_scandinavian_flavor.2.d: "The [From.GetAdjective] [From.Monarch.GetTitle] has accepted our offer of union!"
 fep_scandinavian_flavor.2.a: "What a joyous day!"
 fep_scandinavian_flavor.3.t: "[From.GetName] Refuses!"
 fep_scandinavian_flavor.3.d: "The [From.GetAdjective] [From.Monarch.GetTitle] has refused our offer of union!"
 fep_scandinavian_flavor.3.a: "Well, it's their funeral..."
 fep_scandinavian_flavor.4.t: "REPLACE_ME"
 fep_scandinavian_flavor.4.desc: "REPLACE_ME"
 fep_scandinavian_flavor.4.a: "REPLACE_ME"
 fep_scandinavian_flavor.4.b: "REPLACE_ME"
 fep_scandinavian_flavor.5: "Heir of Valdemar"
 fep_scandinavian_flavor.5.t: "Heir of Valdemar"
 fep_scandinavian_flavor.5.d: "Something about the reconquest of Valdemar's empire"
 fep_scandinavian_flavor.5.a: "Sweet"
 fep_scandinavian_flavor.6: "Dreams of an Empire"
 fep_scandinavian_flavor.6.t: "Dreams of an Empire"
 fep_scandinavian_flavor.6.d: "We got scandinavia yo"
 fep_scandinavian_flavor.6.a: "Neat"

# Dablit/Dali events
 dablit_flavor.0.t: "Monastic life"
 dablit_flavor.0.d: "Many rulers before us has abdicated the throne in favour of a monastic life, with us having ruled for quite a while for now and our succession secured, a monastic lifestyle in the temples seems ever more tempting..."
 dablit_flavor.0.a: "I shall abdicate in favour for my heir and become a monk"
 dablit_flavor.0.b: "I shall rule till I leave this world"
 dablit_flavor.1.t: "A New Capital?"
 dablit_flavor.1.d: "The city of Sit Zaind was founded during the Nanzhao period as a secondary city the the Yunnan region. With recent growth of the city into another regional centre, there has been suggestions to move our capital there."
 dablit_flavor.1.a: "$CAPITAL_CITY$ is fine"
 dablit_flavor.1.b: "It does seem like a nice city"
 CDL_abdication_tooltip: "$MONARCH$ Abdicates the throne to live a monastic lifestyle"
 dablit_flavor.3.t: "Royal Library of Dablit"
 dablit_flavor.3.d: "With the founding of our library, we need to start accumulating literatures. What kind of literatures should we focus on collecting?"
 dablit_flavor.3.a: "We should collect literature on Philosophies"
 dablit_flavor.3.b: "We should collect Epic Poetry"
 dablit_flavor.3.c: "We should collect Martial Arts guides"

