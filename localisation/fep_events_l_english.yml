# Solongos
 fep_solongos_flavor.1.t: "Kunisheifu rule over Korea"
 fep_solongos_flavor.1.d: ""
 fep_solongos_flavor.1.a: "Let them have Korea, Japan is all we want"
 fep_solongos_flavor.1.b: "Not an inch of territory!"
 fep_solongos_flavor.2.t: "The great Khan grants us self rule"
 fep_solongos_flavor.2.d: ""
 fep_solongos_flavor.2.a: "Let our rule begin!"
 fep_solongos_flavor.3.t: "The great Khan tightens [Root.GetHerHis] grip"
 fep_solongos_flavor.3.d: ""
 fep_solongos_flavor.3.a: "They are our overlord, we shall follow their orders"
 fep_solongos_flavor.3.a: "This means war then!"
 fep_solongos_flavor.4.t: "Return of the King"
 fep_solongos_flavor.4.d: ""
 fep_solongos_flavor.4.a: "Our rule shall not be shakened!"
 fep_solongos_flavor.4.b: "Time to drive out the barbarians!"
 fep_solongos_flavor.5.t: "Mutiny in the army"
 fep_solongos_flavor.5.d: ""
 fep_solongos_flavor.5.a: "Crush this traitor!"
 fep_solongos_flavor.5.b: "A new era is upon us!"
 fep_solongos_flavor.6.t: "Turmoil in Korea"
 fep_solongos_flavor.6.d: ""
 fep_solongos_flavor.6.a: "They need our help!"
 fep_solongos_flavor.6.b: "We can't spare resources to help them!"

# Sabara
 flavor_SAB.0.t: "The Lion Ready to Pounce"
 flavor_SAB.0.d: ""
 flavor_SAB.0.a: "The Tomanids Shall Establish a True Roman Empire!"
 fep_start_tt: "[Root.fep_start_text]"

 flavor_SAB.1.t: "Absorption of the Asturean Throne"
 flavor_SAB.1.d: "For several decades, the throne of the Astures has lasted as our subordinate, preventing us from reaching the coast. No more!"
 flavor_SAB.1.a: "Integrate the Astureans into our court."
 flavor_SAB.1.b: "The Astureans are merely confused Sabarians, is all!"

 flavor_SAB.2.t: "The Iberian Wedding"
 flavor_SAB.2.d: "[LUS.Monarch.GetName] is well known for [LUS.Monarch.GetHerHis]... infertility problems, and [GAL.GetName] is an unruly throne without a secure succession. Perhaps we should approach their court about a potential union with us?"
 flavor_SAB.2.a: "Let us bind their dynasty to ours."
 flavor_SAB.2.b: "We musn't sully our ties to Lusitania, we shall marry them instead."
 flavor_SAB.2.c: "To hell with them both! Their land is forfeit!"
 flavor_SAB.2.e: "No."

 flavor_SAB.3.t: "Sabaria Offers Their Hand in Marriage"
 flavor_SAB.3.d: "Sabaria has offered their hand in a proposal of union between our two nations. Should we accept?"
 flavor_SAB.3.a: "Let us bind their dynasty to ours."
 flavor_SAB.3.b: "Are they crazy!?"

 flavor_SAB.4.t: "[GAL.GetName] abandons the Union of Saint James!"
 flavor_SAB.4.d: "In a move of utter cowardice, the Gallaecians have broken the Union of Saint James in favor of Sabaria!"
 flavor_SAB.4.a: "How dare they!"
 flavor_SAB.4.b: "We haven't much choice, I suppose..."

 flavor_SAB.5.t: "[From.GetName] Refuses!"
 flavor_SAB.5.d: ""
 flavor_SAB.5.a: "Damn!"

# Iberian Flavor

 fep_iberian_flavor.0.t: "The Matter of Baetica"
 fep_iberian_flavor.0.d: "Ever since the Gothic wars in the north, Baetica has been ripe for the taking. But the question remains: what to do with the Baeticans?"
 fep_iberian_flavor.0.a: "It's hopeless for those barbarians."
 fep_iberian_flavor.0.b: "We'll civilize those Goths yet!"

 fep_iberian_flavor.1.t: "The Bishop of Iria Flavia Makes an Offer"
 fep_iberian_flavor.1.d: "As our soldiers approached the walls of [206.GetName] the local bishop from Iria Flavia approached our convoy by himself, panting and out of breath. He told the general that he had rushed to meet the army in hopes of brokering a deal with us. According to his story, the Lusitanian-appointed Duke of [GAL.GetName] had fled when he heard of our armies approaching, leaving the Bishop as the authority in the area. He said that if we allow him to reach the city before us, he can order the men of [GAL.GetName] to open their gates to us, and can even rally many of the other northern Iberians behind him."
 fep_iberian_flavor.1.a: "Anything for a man of faith, even if he may be a heretic.."
 fep_iberian_flavor.1.b: "Duke [GAL.Heir.GetName] has fled you say? To the stake with you, heretic!"

 fep_iberian_flavor.2.t: "Crossing the Pyrenees"
 fep_iberian_flavor.2.d: "Our council has devised the best way to deal with administration in Gaul is through..."
 fep_iberian_flavor.2.a: "A client kingdom."
 fep_iberian_flavor.2.b: "Direct rule."

 fep_iberian_flavor.3.t: "At the Doors of Rome"
 fep_iberian_flavor.3.d: "Italia has fallen under our grasp. What should we do with such distant lands?"
 fep_iberian_flavor.3.a: "The Pope shall be made a part of the empire!"
 fep_iberian_flavor.3.b: "The Pope has had so much power that it's gone to his head. We shall rule in Rome"

 fep_iberian_flavor.4.t: "The Jews of Mauritania"
 fep_iberian_flavor.4.d: "The Moroccan Jewry or Maroka'im have been in the region since the times of the ancient Carthaginian ports in the region, and grew quite numerous under the tolerant Mauri Empire. Now the local Rabbi in [344.GetName], Abraham, has requested that the Jews be granted semi-autonomous state in the region to guarantee their continued existence."
 fep_iberian_flavor.4.a: "It's an offer we can't refuse."
 fep_iberian_flavor.4.b: "...Do you take us for fools? Get out of our lands or be killed!"
 fep_iberian_flavor.4.c: "What if we were to settle your people in the Fortunate Isles to our West?"

 fep_iberian_flavor.5.t: "The Exarchate of Africa"
 fep_iberian_flavor.5.d: "It's been more than three centuries since [341.GetName] was under Hellenic rule. Should we reestablish the old autocracy of Africa?"
 fep_iberian_flavor.5.a: "Yes!"
 fep_iberian_flavor.5.b: "No, our rule is better."

 fep_iberian_flavor.6.t: "The East Indican Company"
 fep_iberian_flavor.6.d: "The powerful Palaiologos family has approached our [Root.Monarch.GetTitle] with a proposition: allow the family's trading company to administer our holdings in the Far East"
 fep_iberian_flavor.6.a.tt: "§Y[Root.GetName]§! releases the §YEtaria Anatolikon Indica§! in §YIndia§!.\n§YThe Etaria Anatolikon Indica§! becomes a §YCommercial Enterprise§! subject of §Y[Root.GetName]§!."
 fep_iberian_flavor.6.a: "Let the company take control over our Indican affairs"
 fep_iberian_flavor.6.b: "We can administrate Indica ourselves"
 fep_iberian_flavor.6.c: "We will see how this company will fare..."

 fep_iberian_flavor.7.t: "Maroka'im Flee from Pogrom"
 fep_iberian_flavor.7.d: "Needless to say, the Jewry in Mauretania did not take too kindly to our treatment of them. As a response to our pogrom, renowned Jewish pirate Moses Cohen and his brother Abraham (the very same Rabbi that approached us on this matter in the first place) have organized a mass exodus of the Jews in our lands."
 fep_iberian_flavor.7.a: "Where do they possibly think they will go?"
 moroccan_jews_fleeing_tt: "The §YMaroka'im§! and §YSephardim§! in our lands will flee from our oppressive rule and sail to the West as far as their ships will take them..."
 fep_iberian_flavor.7.b: "Goodbye and good riddance!"

 fep_iberian_flavor.8.t: "Strangers at our Shores"
 fep_iberian_flavor.8.d: "Strange ships have been sighted on our shores. Although they do not speak our language, they seem to have come from a long ways away. Anytime we try to ask who they are, they repeat the same two phrases: 'Epalhuam' and 'Etzlaol.'"
 fep_iberian_flavor.8.a: "They may seek shelter in our lands"
 fep_iberian_flavor.8.b: "Accept these newcomers with open arms!"

 fep_iberian_flavor.9.t: "The Grand Feast in [Root.Capital.GetName]"
 fep_iberian_flavor.9.d: "To celebrate our newly-gained freedom, [Root.Monarch.GetTitle] [Root.Monarch.GetName] has decided to hold a grand feast in [Root.Capital.GetName]. However, when raising the final toast, disaster struck as the wine the [Root.Monarch.GetTitle] drank caused [Root.Monarch.GetHerHim] to begin shaking violently before falling out of [Root.Monarch.GetHerHis] seat!"
 fep_iberian_flavor.9.a: ""H..Help.. me...""

 fep_iberian_flavor.10.t: "[Root.Monarch.GetTitle] [Root.Monarch.GetName] wakes up from [Root.Monarch.GetHerHis] coma!"
 fep_iberian_flavor.10.d: "After a tense few days, [Root.Monarch.GetTitle] [Root.Monarch.GetName] has woken up from [Root.Monarch.GetHerHis] unconscious state, claiming to have been sent a vision from God Himself! According to the vision, when Jesus referred to His cup of wine as His Blood at the last supper, he wasn't just making a metaphor, but was in fact blessing all grapes and the wine they produced! \n While many in the clergy have denounced this supposed vision as heretical, many in the alchemical crowd have claimed that the properties found in wine confirm [Root.Monarch.GetTitle] [Root.Monarch.GetName]'s vision, and that [Root.Monarch.GetHerHim] has in fact attained gnosis. Needless to say, massive changes have already been taken to ensure the spread of this new "Sangrist" sect."
 fep_iberian_flavor.10.a: "By His Blood, we shall be made pure!"

 fep_iberian_flavor.12.t: "An Empire of Red and White"
 fep_iberian_flavor.12.d: "Rome is ours. Constantinople is ours. From [206.GetName] to [364.GetName], the original vision set out all those years ago has finally come to fruition, allowing us to raise a final toast to our efforts."
 fep_iberian_flavor.12.a: "By His Blood, we have been made pure!"

 fep_iberian_flavor.13.t: "Masters of the Goths"
 fep_iberian_flavor.13.d: "With our subjugation of the former Visigothic Kingdoms arises the question of how to rule the conquered lands."
 fep_iberian_flavor.13.a: "The Visigoths shall be administrated by a unified court."
 fep_iberian_flavor.13.b: "The current situation is fine."
 fep_iberian_flavor.13.c: "We shall claim the thrones of Baetica and Toledo for ourselves!"

 fep_iberian_flavor.14.t: "The Voyage of Leopiltud Verognian"
 fep_iberian_flavor.14.d: "Seeking wealth and glory, an ambitious man named Leopiltud Verognian has approached the [Root.Monarch.GetTitle] with a proposal. He has heard rumors among the subjugated natives of lands to the west rich in gold and other riches, and offers to claim these riches for the crown in exchange for a share of the spoils and sponsorship from the crown."
 fep_iberian_flavor.14.a: "This brave soul must be sponsored with our coffers!"
 fep_iberian_flavor.14.b: "He's on his own."
 fep_iberian_flavor.14.c: "I wonder what he'll get up to..."
